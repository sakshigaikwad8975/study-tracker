<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Get Started | Studify</title>
  <link rel="stylesheet" href="sign-up.css">
</head>
<body>

  <div class="form-container">
    <h1>Get Started with Studify</h1>
    <p class="subtitle">
      Create your account to start organizing your studies smarter.
    </p>

    <form class="signup-form">

      <label>
        Full Name
        <input type="text" placeholder="Enter your name" required>
      </label>

      <label>
        Email Address
        <input type="email" placeholder="you@example.com" required>
      </label>

      <label>
        Password
        <input type="password" placeholder="Create a password" required>
      </label>

      <label>
        How did you hear about us?
        <select required>
          <option value="">Select an option</option>
          <option>Friend / Classmate</option>
          <option>College / Professor</option>
          <option>Social Media</option>
          <option>Online Search</option>
          <option>Other</option>
        </select>
      </label>

      <p class="hint">
        This helps us improve Studify for students like you.
      </p>

      <button type="submit">Create Account</button>

      <p class="login-text">
        Already have an account? <a href="#">Log in</a>
      </p>

    </form>
  </div>

  <script src="sign-up.js"></script>
</body>
</html>
